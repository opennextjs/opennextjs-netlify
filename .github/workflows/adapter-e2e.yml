# reference: https://nextjs.org/docs/app/api-reference/adapters/testing-adapters

name: test-e2e-deploy

on:
  push:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: 'Next.js repo ref (branch/tag/SHA)'
        default: 'canary'
        type: string
  # schedule:
  #   - cron: '0 2 * * *'

jobs:
  build:
    name: Build Next.js + adapter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          path: adapter

      - uses: actions/checkout@v6
        with:
          fetch-depth: 25
          path: nextjs
          repository: vercel/next.js
          ref: ${{ inputs.nextjsRef || 'canary' }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.6'

      - name: Setup pnpm
        run: npm i -g corepack && corepack enable

      - name: Install & build Next.js
        working-directory: nextjs
        run: pnpm i && pnpm run build && pnpm i

      - name: Install Playwright
        working-directory: nextjs
        run: pnpm exec playwright install --with-deps chromium

      - name: Build adapter
        working-directory: adapter
        run: npm ci && npm run build

      - uses: actions/cache/save@v5
        with:
          # Keyed only on sha so that re-runs of the test job (which get a new
          # run_id) can still find the cache saved by the original build run.
          key: build-${{ github.sha }}
          path: |
            ~/.cache/ms-playwright
            adapter
            nextjs

  test:
    name: Tests (${{ matrix.group }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        group:
          [
            1/16,
            2/16,
            3/16,
            4/16,
            5/16,
            6/16,
            7/16,
            8/16,
            9/16,
            10/16,
            11/16,
            12/16,
            13/16,
            14/16,
            15/16,
            16/16,
          ]
    steps:
      - uses: actions/cache/restore@v5
        with:
          # Must match the key used in the build job.
          # fail-on-cache-miss ensures a cache miss surfaces here rather than
          # failing cryptically later when a step uses working-directory: nextjs.
          fail-on-cache-miss: true
          key: build-${{ github.sha }}
          path: |
            ~/.cache/ms-playwright
            adapter
            nextjs

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        run: npm i -g corepack && corepack enable

      - name: Ensure Playwright browser
        working-directory: nextjs
        run: pnpm playwright install chromium

      - name: Make scripts executable
        run: |
          chmod +x adapter/scripts/e2e-deploy.sh
          chmod +x adapter/scripts/e2e-logs.sh
          chmod +x adapter/scripts/e2e-cleanup.sh

      - name: Run deploy tests
        working-directory: nextjs
        env:
          ADAPTER_DIR: ${{ github.workspace }}/adapter
          IS_TURBOPACK_TEST: 1
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_ADAPTER_E2E_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_ADAPTER_E2E_SITE_ID }}
          NEXT_E2E_TEST_TIMEOUT: 240000
          NEXT_EXTERNAL_TESTS_FILTERS: test/deploy-tests-manifest.json
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_TEST_JOB: 1
          NEXT_TEST_MODE: deploy
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-cleanup.sh
        run: node run-tests.js -c 2 -g ${{ matrix.group }} --timings --type e2e
